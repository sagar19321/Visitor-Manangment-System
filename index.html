<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poona Rent A Cab Pvt. Ltd. — Visitor Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  #root { height: 100vh; height: 100dvh; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #D5DCEA; border-radius: 8px; }
  select { font-family: inherit; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid #1E4FD9; outline-offset: 1px;
  }
  button { font-family: inherit; }

  /* ===== LOGIN PAGE ANIMATIONS ===== */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes floatOrb {
    0%,100% { transform: translateY(0px) scale(1); }
    50%      { transform: translateY(-28px) scale(1.04); }
  }
  @keyframes floatOrb2 {
    0%,100% { transform: translateY(0px) scale(1); }
    50%      { transform: translateY(22px) scale(0.97); }
  }
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  @keyframes pulseRing {
    0%   { transform: scale(1);   opacity: 0.6; }
    70%  { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes scanLine {
    0%   { top: 0%; opacity: 0.7; }
    50%  { opacity: 1; }
    100% { top: 100%; opacity: 0.7; }
  }
  @keyframes tickerScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes dotBlink {
    0%,100% { opacity: 0.3; transform: scale(0.8); }
    50%      { opacity: 1;   transform: scale(1.2); }
  }
  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes logoSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes inputFocusGlow {
    from { box-shadow: 0 0 0 0 rgba(30,79,217,0.4); }
    to   { box-shadow: 0 0 0 6px rgba(30,79,217,0); }
  }

  .login-orb1 { animation: floatOrb 7s ease-in-out infinite; }
  .login-orb2 { animation: floatOrb2 9s ease-in-out infinite; }
  .login-orb3 { animation: floatOrb 11s ease-in-out infinite 2s; }
  .login-panel { animation: cardEntrance 0.6s cubic-bezier(0.34,1.2,0.64,1) both; }
  .login-header { animation: fadeSlideUp 0.5s ease both; }
  .choose-card { animation: cardEntrance 0.55s cubic-bezier(0.34,1.2,0.64,1) both; }
  .admin-card  { animation: cardEntrance 0.45s cubic-bezier(0.34,1.2,0.64,1) both; }

  .role-btn {
    transition: all 0.2s cubic-bezier(0.34,1.2,0.64,1) !important;
  }
  .role-btn:hover {
    transform: translateY(-2px) scale(1.01) !important;
    box-shadow: 0 12px 30px -8px rgba(11,30,61,0.18) !important;
    border-color: #1E4FD9 !important;
  }
  .role-btn:active {
    transform: scale(0.98) !important;
  }

  .login-submit-btn {
    transition: all 0.18s ease !important;
    position: relative;
    overflow: hidden;
  }
  .login-submit-btn::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .login-submit-btn:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 16px 36px -8px rgba(30,79,217,0.6) !important;
  }
  .login-submit-btn:active { transform: translateY(0) scale(0.98) !important; }

  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(79,143,255,0.8), transparent);
    animation: scanLine 2.5s linear infinite;
    pointer-events: none;
  }

  .ticker-track { display: flex; animation: tickerScroll 22s linear infinite; }

  .live-dot { display: inline-block; border-radius: 50%; }
  .live-dot:nth-child(1) { animation: dotBlink 1.2s ease-in-out infinite 0s; }
  .live-dot:nth-child(2) { animation: dotBlink 1.2s ease-in-out infinite 0.2s; }
  .live-dot:nth-child(3) { animation: dotBlink 1.2s ease-in-out infinite 0.4s; }

  .login-input-wrap input:focus {
    border-color: #1E4FD9 !important;
    box-shadow: 0 0 0 3px rgba(30,79,217,0.12) !important;
    background: #fff !important;
  }

  .pulse-ring {
    position: absolute; inset: -6px; border-radius: 50%;
    border: 2px solid rgba(31,157,109,0.5);
    animation: pulseRing 2s ease-out infinite;
  }

  .reception-img-wrap {
    position: relative; overflow: hidden; border-radius: 20px;
  }
  .reception-img-wrap::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(11,30,61,0.55) 0%, transparent 55%);
    pointer-events: none;
  }

  /* ===== RESPONSIVE ===== */

  /* Login grid: two-col → one-col on mobile */
  .login-grid {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 40px;
    align-items: center;
    width: 100%;
    max-width: 980px;
  }
  @media (max-width: 767px) {
    .login-grid {
      grid-template-columns: 1fr !important;
      gap: 0 !important;
      max-width: 440px !important;
    }
    .login-left-panel { display: none !important; }

    /* Allow scrolling on login on short mobile screens */
    body { overflow: auto !important; height: auto !important; }
    html { overflow: auto !important; height: auto !important; }
    #root { height: auto !important; min-height: 100dvh; }
  }

  /* Visit row responsive — hide type/host on mobile */
  @media (max-width: 640px) {
    .visit-row-grid {
      grid-template-columns: auto 1fr auto auto !important;
      gap: 8px !important;
      padding: 11px 12px !important;
    }
    .visit-col-type { display: none !important; }
    .visit-col-host { display: none !important; }
  }

  /* Search/filter bar stacks on mobile */
  @media (max-width: 600px) {
    .search-bar-wrap { flex-direction: column !important; }
    .search-bar-wrap > * { width: 100% !important; max-width: 100% !important; }
  }

  /* Receptionist header wraps on mobile */
  @media (max-width: 520px) {
    .rec-header-buttons { flex-wrap: wrap !important; gap: 6px !important; }
    .rec-header-btn { font-size: 0.73rem !important; padding: 7px 10px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

function useWindowWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return w;
}

/* ---------- IST Time Helper ---------- */
function toISO_IST(date) {
  const pad = n => String(n).padStart(2, '0');
  const ist = new Date(date.getTime() + 5.5 * 3600000);
  return `${ist.getUTCFullYear()}-${pad(ist.getUTCMonth() + 1)}-${pad(ist.getUTCDate())} ${pad(ist.getUTCHours())}:${pad(ist.getUTCMinutes())}:${pad(ist.getUTCSeconds())} IST`;
}
