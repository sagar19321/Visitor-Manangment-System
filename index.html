<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poona Rent A Cab Pvt. Ltd. — Visitor Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  #root { height: 100vh; height: 100dvh; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #D5DCEA; border-radius: 8px; }
  select { font-family: inherit; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid #1E4FD9; outline-offset: 1px;
  }
  button { font-family: inherit; }

  /* ===== LOGIN PAGE ANIMATIONS ===== */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes floatOrb {
    0%,100% { transform: translateY(0px) scale(1); }
    50%      { transform: translateY(-28px) scale(1.04); }
  }
  @keyframes floatOrb2 {
    0%,100% { transform: translateY(0px) scale(1); }
    50%      { transform: translateY(22px) scale(0.97); }
  }
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  @keyframes pulseRing {
    0%   { transform: scale(1);   opacity: 0.6; }
    70%  { transform: scale(1.6); opacity: 0; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  @keyframes scanLine {
    0%   { top: 0%; opacity: 0.7; }
    50%  { opacity: 1; }
    100% { top: 100%; opacity: 0.7; }
  }
  @keyframes tickerScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes dotBlink {
    0%,100% { opacity: 0.3; transform: scale(0.8); }
    50%      { opacity: 1;   transform: scale(1.2); }
  }
  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes logoSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes inputFocusGlow {
    from { box-shadow: 0 0 0 0 rgba(30,79,217,0.4); }
    to   { box-shadow: 0 0 0 6px rgba(30,79,217,0); }
  }

  .login-orb1 { animation: floatOrb 7s ease-in-out infinite; }
  .login-orb2 { animation: floatOrb2 9s ease-in-out infinite; }
  .login-orb3 { animation: floatOrb 11s ease-in-out infinite 2s; }
  .login-panel { animation: cardEntrance 0.6s cubic-bezier(0.34,1.2,0.64,1) both; }
  .login-header { animation: fadeSlideUp 0.5s ease both; }
  .choose-card { animation: cardEntrance 0.55s cubic-bezier(0.34,1.2,0.64,1) both; }
  .admin-card  { animation: cardEntrance 0.45s cubic-bezier(0.34,1.2,0.64,1) both; }

  .role-btn {
    transition: all 0.2s cubic-bezier(0.34,1.2,0.64,1) !important;
  }
  .role-btn:hover {
    transform: translateY(-2px) scale(1.01) !important;
    box-shadow: 0 12px 30px -8px rgba(11,30,61,0.18) !important;
    border-color: #1E4FD9 !important;
  }
  .role-btn:active {
    transform: scale(0.98) !important;
  }

  .login-submit-btn {
    transition: all 0.18s ease !important;
    position: relative;
    overflow: hidden;
  }
  .login-submit-btn::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .login-submit-btn:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 16px 36px -8px rgba(30,79,217,0.6) !important;
  }
  .login-submit-btn:active { transform: translateY(0) scale(0.98) !important; }

  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(79,143,255,0.8), transparent);
    animation: scanLine 2.5s linear infinite;
    pointer-events: none;
  }

  .ticker-track { display: flex; animation: tickerScroll 22s linear infinite; }

  .live-dot { display: inline-block; border-radius: 50%; }
  .live-dot:nth-child(1) { animation: dotBlink 1.2s ease-in-out infinite 0s; }
  .live-dot:nth-child(2) { animation: dotBlink 1.2s ease-in-out infinite 0.2s; }
  .live-dot:nth-child(3) { animation: dotBlink 1.2s ease-in-out infinite 0.4s; }

  .login-input-wrap input:focus {
    border-color: #1E4FD9 !important;
    box-shadow: 0 0 0 3px rgba(30,79,217,0.12) !important;
    background: #fff !important;
  }

  .pulse-ring {
    position: absolute; inset: -6px; border-radius: 50%;
    border: 2px solid rgba(31,157,109,0.5);
    animation: pulseRing 2s ease-out infinite;
  }

  .reception-img-wrap {
    position: relative; overflow: hidden; border-radius: 20px;
  }
  .reception-img-wrap::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(11,30,61,0.55) 0%, transparent 55%);
    pointer-events: none;
  }

  /* ===== RESPONSIVE ===== */

  /* Login grid: two-col → one-col on mobile */
  .login-grid {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 40px;
    align-items: center;
    width: 100%;
    max-width: 980px;
  }
  @media (max-width: 767px) {
    .login-grid {
      grid-template-columns: 1fr !important;
      gap: 0 !important;
      max-width: 440px !important;
    }
    .login-left-panel { display: none !important; }

    /* Allow scrolling on login on short mobile screens */
    body { overflow: auto !important; height: auto !important; }
    html { overflow: auto !important; height: auto !important; }
    #root { height: auto !important; min-height: 100dvh; }
  }

  /* Visit row responsive — hide type/host on mobile */
  @media (max-width: 640px) {
    .visit-row-grid {
      grid-template-columns: auto 1fr auto auto !important;
      gap: 8px !important;
      padding: 11px 12px !important;
    }
    .visit-col-type { display: none !important; }
    .visit-col-host { display: none !important; }
  }

  /* Search/filter bar stacks on mobile */
  @media (max-width: 600px) {
    .search-bar-wrap { flex-direction: column !important; }
    .search-bar-wrap > * { width: 100% !important; max-width: 100% !important; }
  }

  /* Receptionist header wraps on mobile */
  @media (max-width: 520px) {
    .rec-header-buttons { flex-wrap: wrap !important; gap: 6px !important; }
    .rec-header-btn { font-size: 0.73rem !important; padding: 7px 10px !important; }
  }
</style>
</head>

/* --- Responsive hook --- */
function useWindowWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1200);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return w;
}

/* ---------- Admin credentials ---------- */
const ADMIN_CREDS_KEY = "vos_admin_credentials";
function loadAdminCreds() {
  try {
    const raw = localStorage.getItem(ADMIN_CREDS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.password) return parsed;
    }
  } catch (e) {}
  return { email: "admin@poonatravels.com", password: "admin123" };
}
function saveAdminCreds(creds) {
  try { localStorage.setItem(ADMIN_CREDS_KEY, JSON.stringify(creds)); } catch (e) {}
}

/* ---------- Reception accounts (multi-account) ---------- */
const RECEPTION_ACCOUNTS_KEY = "vos_reception_accounts";
function loadReceptionAccounts() {
  try {
    const raw = localStorage.getItem(RECEPTION_ACCOUNTS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch (e) {}
  return [{ id: "rec_default", name: "Reception", password: "reception123", email: "reception@company.com", createdAt: new Date().toISOString() }];
}
function saveReceptionAccounts(accounts) {
  try { localStorage.setItem(RECEPTION_ACCOUNTS_KEY, JSON.stringify(accounts)); } catch (e) {}
}

/* Legacy single-creds — kept for login check backward compat */
const RECEPTION_CREDS_KEY = "vos_reception_credentials";
function loadReceptionCreds() {
  // Now we check against accounts list
  const accounts = loadReceptionAccounts();
  return accounts[0] || { id: "reception", password: "reception123" };
}
function saveReceptionCreds(creds) {
  try { localStorage.setItem(RECEPTION_CREDS_KEY, JSON.stringify(creds)); } catch (e) {}
}
function checkReceptionLogin(inputId, inputPw) {
  const accounts = loadReceptionAccounts();
  return accounts.find(a =>
    a.name.trim().toLowerCase() === inputId.trim().toLowerCase() && a.password === inputPw
  ) || null;
}

function fmtTime(d) {
  return d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
}
function fmtDate(d) {
  return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
}
function minutesBetween(a, b) {
  return Math.round((b - a) / 60000);
}
function durationLabel(mins) {
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${h}h ${m}m`;
}

/* ---------- CSV export helpers ---------- */
function csvEscape(val) {
  const s = String(val == null ? "" : val);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function downloadCSV(filename, headers, rows) {
  const lines = [headers.map(csvEscape).join(",")];
  rows.forEach((row) => lines.push(row.map(csvEscape).join(",")));
  const csv = lines.join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function visitRowsToCSV(visits, hosts) {
  const headers = ["Name", "Phone", "Company", "Visit Type", "Host", "Department", "Purpose", "Check-in", "Check-out", "Duration", "Status"];
  const rows = visits.map((v) => {
    const t = VISIT_TYPES.find((x) => x.id === v.type);
    const host = hosts.find((h) => h.id === v.hostId);
    return [
      v.name, v.phone, v.company || "—", t ? t.label : v.type,
      host ? host.name : "—", host ? host.dept : "—", v.purpose,
      `${fmtDate(v.checkIn)} ${fmtTime(v.checkIn)}`,
      v.checkOut ? `${fmtDate(v.checkOut)} ${fmtTime(v.checkOut)}` : "Still inside",
      v.checkOut ? durationLabel(minutesBetween(v.checkIn, v.checkOut)) : "—",
      v.status === "checked-in" ? "Checked In" : "Checked Out",
    ];
  });
  return { headers, rows };
}

  monthVisits.forEach((v) => {

}

function WebcamCapture({ photo, onCapture, onClear }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const [mode, setMode] = useState("idle"); // idle | starting | live | error
  const [errMsg, setErrMsg] = useState("");

  function stopStream() {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach((t) => t.stop());
      streamRef.current = null;
    }
    if (videoRef.current) {
      videoRef.current.srcObject = null;
    }
  }

  async function startCamera() {
    // If a stream is already live, don't request a new one.
    if (streamRef.current && mode === "live") return;
    setMode("starting");
    setErrMsg("");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 480 }, height: { ideal: 360 }, facingMode: "user" },
        audio: false,
      });
      streamRef.current = stream;
      setMode("live");
    } catch (err) {
      setMode("error");
      if (err && err.name === "NotAllowedError") {
        setErrMsg("Camera permission was denied. Please allow camera access in your browser settings.");
      } else if (err && err.name === "NotFoundError") {
        setErrMsg("No webcam was found on this device.");
      } else {
        setErrMsg("Could not access the webcam. Please check your camera and try again.");
      }
    }
  }

  // Attach the stream to the <video> element only once it exists in the DOM
  // (i.e. after mode becomes "live" and React has rendered the <video> tag).
  useEffect(() => {
    if (mode === "live" && streamRef.current && videoRef.current) {
      const video = videoRef.current;
      video.srcObject = streamRef.current;
      const playVideo = () => {
        video.play().catch(() => {
          // Autoplay can be blocked momentarily on some mobile browsers;
          // retry once after a short delay.
          setTimeout(() => video.play().catch(() => {}), 200);
        });
      };
      if (video.readyState >= 1) {
        playVideo();
      } else {
        video.onloadedmetadata = playVideo;
      }
    }
  }, [mode]);

  function takeSnapshot() {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) {
      // Video isn't ready yet — try again shortly instead of capturing a black frame.
      setTimeout(takeSnapshot, 150);
      return;
    }
    const size = 320;
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext("2d");
    const side = Math.min(vw, vh);
    const sx = (vw - side) / 2, sy = (vh - side) / 2;
    ctx.drawImage(video, sx, sy, side, side, 0, 0, size, size);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    stopStream();
    setMode("idle");
    onCapture(dataUrl);
  }

  function retake() {
    onClear();
    stopStream();
    // Give the browser a brief moment to fully release the previous camera
    // track before requesting a new stream — helps avoid a duplicate prompt.
    setTimeout(startCamera, 250);
  }

  useEffect(() => {
    return () => stopStream();
  }, []);

  if (photo) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <img src={photo} alt="Visitor" style={{
          width: 84, height: 84, borderRadius: 12, objectFit: "cover",
          border: "2px solid " + COLORS.success,
        }} />
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, color: COLORS.success, fontWeight: 700, fontSize: "0.85rem", marginBottom: 8 }}>
            <Icon name="CheckCircle2" size={16} /> Photo captured
          </div>
          <button onClick={retake} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 8,
            border: "1.5px solid #E3E8F2", background: "#FAFBFD", color: COLORS.slate,
            fontWeight: 700, fontSize: "0.8rem", cursor: "pointer",
          }}>
            <Icon name="RefreshCw" size={14} /> Retake photo
          </button>
        </div>
      </div>
    );
  }

  if (mode === "live") {
    return (
      <div>
        <div style={{
          position: "relative", width: "100%", maxWidth: 320, margin: "0 auto",
          borderRadius: 14, overflow: "hidden", background: "#000", aspectRatio: "1/1",
        }}>
          <video ref={videoRef} autoPlay playsInline muted style={{
            width: "100%", height: "100%", objectFit: "cover", transform: "scaleX(-1)",
          }} />
          <div style={{
            position: "absolute", inset: 14, border: "2px dashed rgba(255,255,255,0.5)",
            borderRadius: 12, pointerEvents: "none",
          }} />
        </div>
        <canvas ref={canvasRef} style={{ display: "none" }} />
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 12 }}>
          <button onClick={() => { stopStream(); setMode("idle"); }} style={{
            padding: "10px 16px", borderRadius: 9, border: "1.5px solid #E3E8F2", background: "#fff",
            color: COLORS.slate, fontWeight: 700, fontSize: "0.82rem", cursor: "pointer",
          }}>Cancel</button>
          <button onClick={takeSnapshot} style={{
            display: "flex", alignItems: "center", gap: 7, padding: "10px 20px", borderRadius: 9, border: "none",
            background: COLORS.royal, color: "#fff", fontWeight: 700, fontSize: "0.82rem", cursor: "pointer",
            boxShadow: "0 8px 18px -8px rgba(30,79,217,0.5)",
          }}>
            <Icon name="Camera" size={15} /> Capture Photo
          </button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <button onClick={startCamera} disabled={mode === "starting"} style={{
        width: "100%", padding: "16px", borderRadius: 10, border: "1.5px dashed #C9D3E5",
        background: "#FAFBFD", cursor: mode === "starting" ? "wait" : "pointer",
        display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        color: COLORS.slate, fontWeight: 600, fontSize: "0.85rem",
      }}>
        <Icon name={mode === "starting" ? "RefreshCw" : "Camera"} size={17} />
        {mode === "starting" ? "Starting webcam..." : "Capture via webcam"}
      </button>
      {mode === "error" && (
        <div style={{
          display: "flex", gap: 8, alignItems: "flex-start", marginTop: 10, padding: "10px 12px",
          background: "rgba(214,69,69,0.07)", borderRadius: 9, color: COLORS.danger, fontSize: "0.78rem", fontWeight: 600,
        }}>
          <Icon name="AlertCircle" size={15} style={{ flexShrink: 0, marginTop: 1 }} />
          {errMsg}
        </div>
      )}
    </div>
  );
}

          width: 18, height: 18, borderRadius: "50%", background: "#fff", position: "absolute",

        }} />

function CheckInPage({ onClose, onSubmit, blacklist, hosts }) {
  const [form, setForm] = useState({
    name: "", phone: "", email: "", address: "",
    idType: "", idNumber: "",
    type: "driver", company: "", purpose: "", hostId: hosts[0]?.id || "",
    vehicleNumber: "", duration: "", vip: false,
  });
  const [photo, setPhoto] = useState(null);
  const [resume, setResume] = useState(null);
  const [error, setError] = useState("");

  const isBlacklisted = blacklist.some(
    (b) => b.phone.replace(/\D/g, "").slice(-10) === form.phone && form.phone.length === 10
  );

  function submit() {
    if (!form.name.trim() || !form.phone.trim() || !form.purpose.trim() || !form.type) {
      setError("Please fill in full name, mobile number, visitor category, and purpose of visit.");
      return;
    }
    if (form.phone.length !== 10) {
      setError("Mobile number must be exactly 10 digits.");
      return;
    }
    if (isBlacklisted) {
      setError("This visitor is on the blacklist. Please contact the admin.");
      return;
    }
    onSubmit({ ...form, photo, resume: resume ? resume.name : null });
  }

  return (
    <div style={{ height: "100vh", height: "100dvh", background: COLORS.ice, overflowY: "auto" }}>
      <div style={{
        background: "#fff", borderBottom: "1px solid #E7EBF3", padding: "16px 24px",
        display: "flex", alignItems: "center", gap: 14, position: "sticky", top: 0, zIndex: 5,
      }}>
        <button onClick={onClose} style={{
          border: "none", background: "none", cursor: "pointer", color: COLORS.slate,
          display: "flex", alignItems: "center", gap: 6, fontWeight: 600, fontSize: "0.86rem", padding: 0,
        }}>
          <Icon name="ArrowLeft" size={16} /> Back
        </button>
        <div>
          <div style={{ fontWeight: 800, color: COLORS.navy, fontSize: "1.1rem" }}>Register New Visitor</div>
          <div style={{ fontSize: "0.78rem", color: COLORS.slate, marginTop: 1 }}>Fill in visitor details for pre-registration</div>
        </div>
      </div>

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "20px 20px 100px" }}>
        {isBlacklisted && (
          <div style={{
            background: "rgba(214,69,69,0.08)", border: "1px solid rgba(214,69,69,0.25)",
            borderRadius: 10, padding: "10px 14px", marginBottom: 16, display: "flex",
            gap: 10, alignItems: "flex-start", color: COLORS.danger, fontSize: "0.84rem", fontWeight: 600,
          }}>
            <Icon name="ShieldAlert" size={17} style={{ marginTop: 1, flexShrink: 0 }} />

          </div>
        )}

        <SectionCard title="Visitor Photo">
          <WebcamCapture photo={photo} onCapture={setPhoto} onClear={() => setPhoto(null)} />

        <SectionCard title="Personal Information">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>

              onChange={(e) => setForm({ ...form, name: e.target.value })} />
            <TextField label="Mobile Number" required placeholder="10-digit mobile number" value={form.phone}
              inputMode="numeric" maxLength={10}
              onChange={(e) => setForm({ ...form, phone: e.target.value.replace(/\D/g, "").slice(0, 10) })} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <TextField label="Email" placeholder="email@example.com" value={form.email}
              onChange={(e) => setForm({ ...form, email: e.target.value })} />
            <TextField label="Address" placeholder="City / Area" value={form.address}
              onChange={(e) => setForm({ ...form, address: e.target.value })} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <SelectField label="ID Type" value={form.idType}

            </SelectField>
            <TextField label="ID Number" placeholder="ID card number" value={form.idNumber}

          </div>
        </SectionCard>

        <SectionCard title="Visit Details">
          <div style={{ marginBottom: 16 }}>
            <FieldLabel required>Visitor Category</FieldLabel>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {VISIT_TYPES.map((t) => {
                const active = form.type === t.id;
                return (
                  <button key={t.id} onClick={() => setForm({ ...form, type: t.id, company: "" })} style={{
                    flex: "1 1 auto", display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                    padding: "10px 12px", borderRadius: 10, cursor: "pointer", fontSize: "0.82rem", fontWeight: 700,
                    border: active ? `1.5px solid ${t.color}` : "1.5px solid #E3E8F2",
                    background: active ? t.color + "14" : "#FAFBFD", color: active ? t.color : COLORS.slate,

            </SelectField>
          ) : form.type === "vendor" ? (
            <SelectField label="Purpose / Visit Reason" required value={form.company}
              onChange={(e) => setForm({ ...form, company: e.target.value, purpose: e.target.value })}>

              {VENDOR_PURPOSE_OPTIONS.map((opt) => <option key={opt} value={opt}>{opt}</option>)}

              />

          )}

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <SelectField label="Person to Meet" required value={form.hostId}
              onChange={(e) => setForm({ ...form, hostId: e.target.value })}>
              {hosts.map((h) => <option key={h.id} value={h.id}>{h.name} — {h.dept}</option>)}
            </SelectField>
            <TextField label="Department" value={hosts.find((h) => h.id === form.hostId)?.dept || ""} disabled />

      <div style={{

          <button onClick={submit} disabled={isBlacklisted} style={{
            padding: "12px 26px", borderRadius: 10, border: "none",
            background: isBlacklisted ? "#C9D3E5" : COLORS.royal, color: "#fff", fontWeight: 700,
            cursor: isBlacklisted ? "not-allowed" : "pointer", fontSize: "0.88rem",
            boxShadow: isBlacklisted ? "none" : "0 8px 20px -6px rgba(30,79,217,0.5)",

            <div class="badge-row"><span class="lbl">Department</span><span class="val">${host ? host.dept : "—"}</span></div>

function AddHostModal({ onClose, onSubmit }) {
  const [name, setName] = useState("");
  const [dept, setDept] = useState("");
  const [role, setRole] = useState("");
  const [phone, setPhone] = useState("");
  const [error, setError] = useState("");

  function submit() {
    if (!name.trim()) { setError("Please enter the full name."); return; }
    if (!dept) { setError("Please select a department."); return; }
    if (!role) { setError("Please select a role / designation."); return; }
    if (!phone.trim() || phone.length !== 10) {
      setError("Phone number must be exactly 10 digits.");
      return;
    }
    onSubmit({ name: name.trim(), dept, role, phone: "+91 " + phone });
  }

  return (
    <Modal title="Add New Host" subtitle="Add an employee who visitors can come to meet" onClose={onClose} width={480}>
      <TextField label="Full Name" required placeholder="e.g. Rohan Kale" value={name}
        onChange={(e) => setName(e.target.value)} />

      <SelectField label="Department" required value={dept} onChange={(e) => setDept(e.target.value)}>
        <option value="">Select department</option>
        {DEPARTMENTS.map((d) => <option key={d} value={d}>{d}</option>)}
      </SelectField>

      <SelectField label="Role / Designation" required value={role} onChange={(e) => setRole(e.target.value)}>
        <option value="">Select role</option>
        {HOST_ROLES.map((r) => <option key={r} value={r}>{r}</option>)}
      </SelectField>

      <div style={{ marginBottom: 16 }}>
        <FieldLabel required>Phone Number</FieldLabel>
        <div style={{ position: "relative" }}>
          <span style={{
            position: "absolute", left: 13, top: "50%", transform: "translateY(-50%)",
            fontSize: "0.9rem", color: COLORS.slate, fontWeight: 600, pointerEvents: "none",
          }}>+91</span>
          <input
            value={phone} inputMode="numeric" maxLength={10}
            onChange={(e) => { setPhone(e.target.value.replace(/\D/g, "").slice(0, 10)); }}
            placeholder="10-digit mobile number"
            style={{ ...inputStyle, paddingLeft: 42 }}
          />
        </div>
        {phone.length > 0 && phone.length < 10 && (
          <div style={{ fontSize: "0.74rem", color: COLORS.amber, fontWeight: 600, marginTop: 5 }}>
            {10 - phone.length} more digit{10 - phone.length !== 1 ? "s" : ""} needed
          </div>
        )}
        {phone.length === 10 && (
          <div style={{ fontSize: "0.74rem", color: COLORS.success, fontWeight: 600, marginTop: 5, display: "flex", alignItems: "center", gap: 4 }}>
            <Icon name="CheckCircle2" size={13} /> Valid number
          </div>
        )}
      </div>

      {error && (
        <div style={{
          color: COLORS.danger, fontSize: "0.82rem", fontWeight: 600, marginBottom: 12,
          background: "rgba(214,69,69,0.07)", padding: "9px 12px", borderRadius: 9,
          display: "flex", alignItems: "center", gap: 7,
        }}>
          <Icon name="AlertCircle" size={15} /> {error}
        </div>
      )}

      <div style={{ display: "flex", gap: 10, marginTop: 6 }}>
        <button onClick={onClose} style={{
          flex: 1, padding: "12px", borderRadius: 10, border: "1.5px solid #E3E8F2",
          background: "#fff", color: COLORS.slate, fontWeight: 700, cursor: "pointer", fontSize: "0.88rem",
        }}>Cancel</button>
        <button onClick={submit} style={{
          flex: 2, padding: "12px", borderRadius: 10, border: "none",
          background: COLORS.royal, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: "0.88rem",
          boxShadow: "0 8px 20px -6px rgba(30,79,217,0.5)",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        }}>
          <Icon name="UserPlus" size={16} /> Add Host
        </button>
      </div>
    </Modal>
  );
}

/* ── Live clock for login ── */
function LiveClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const time = now.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true });
  const date = now.toLocaleDateString("en-IN", { weekday: "long", day: "2-digit", month: "long", year: "numeric" });
  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ fontSize: "2.8rem", fontWeight: 800, color: "#fff", letterSpacing: "-0.03em", lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>
        {time}
      </div>
      <div style={{ fontSize: "0.85rem", color: "rgba(255,255,255,0.65)", marginTop: 4, fontWeight: 500 }}>{date}</div>
    </div>
  );
}

function ReceptionistView({ visits, blacklist, activeVisitors, onCheckIn, onCheckout, onLogout, hosts }) {
  const [showCheckIn, setShowCheckIn] = useState(false);
  const [search, setSearch] = useState("");
  const [showChangePw, setShowChangePw] = useState(false);
  const today = new Date();

  const visible = useMemo(() => {
    if (search.trim() === "") return activeVisitors;
    return activeVisitors.filter((v) =>
      v.name.toLowerCase().includes(search.toLowerCase()) || v.phone.includes(search)
    );
  }, [activeVisitors, search]);

  if (showCheckIn) {
    return (
      <CheckInPage
        onClose={() => setShowCheckIn(false)}
        onSubmit={(form) => { onCheckIn(form); setShowCheckIn(false); }}
        blacklist={blacklist}
        hosts={hosts}
      />
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: COLORS.ice }}>
      <div style={{
        background: COLORS.navy, padding: "20px 24px", display: "flex",
        alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            background: "transparent", borderRadius: 12,
            padding: "5px 12px", display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            <img src={POONA_LOGO} alt="Poona Rent A Cab"
              style={{ height: 40, width: "auto", objectFit: "contain" }} />
          </div>
          <div>
            <div style={{ color: "#fff", fontWeight: 800, fontSize: "0.95rem", fontFamily: "'Inter', sans-serif" }}>Poona Rent A Cab Pvt. Ltd.</div>
            <div style={{ color: "rgba(255,255,255,0.5)", fontSize: "0.72rem" }}>Reception Desk</div>
          </div>
        </div>
        <div className="rec-header-buttons" style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={() => setShowChangePw(true)} className="rec-header-btn" style={{
            display: "flex", alignItems: "center", gap: 6, padding: "9px 14px", borderRadius: 10,
            border: "1px solid rgba(255,255,255,0.2)", background: "transparent", color: "rgba(255,255,255,0.7)",
            fontWeight: 600, fontSize: "0.8rem", cursor: "pointer",
          }}>
            <Icon name="Lock" size={15} /> Change Password
          </button>
          <button onClick={onLogout} className="rec-header-btn" style={{
            display: "flex", alignItems: "center", gap: 6, padding: "9px 14px", borderRadius: 10,
            border: "1px solid rgba(255,255,255,0.2)", background: "transparent", color: "rgba(255,255,255,0.7)",

          }}>
            <Icon name="LogOut" size={15} /> Sign out

      <div style={{ padding: "20px 16px", maxWidth: 720, margin: "0 auto", width: "100%" }}>
        <button onClick={() => setShowCheckIn(true)} style={{
          width: "100%", padding: "24px", borderRadius: 18, border: "none", background: COLORS.royal,
          color: "#fff", fontWeight: 800, fontSize: "1.25rem", cursor: "pointer", marginBottom: 24,

/* ── Reset Password Modal (Admin resets a reception account's password) ── */
function ResetPasswordModal({ account, onClose, onReset }) {
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [err, setErr] = useState("");
  const [done, setDone] = useState(false);

  function handleReset() {
    if (!newPw.trim()) { setErr("Please enter a new password."); return; }
    if (newPw !== confirmPw) { setErr("Passwords do not match."); return; }
    onReset(account.id, newPw);
    setDone(true);
    setTimeout(() => onClose(), 1200);
  }

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(11,30,61,0.55)", zIndex: 200,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 20,

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
          <div>
            <div style={{ fontWeight: 800, color: COLORS.navy, fontSize: "1.05rem" }}>Reset Password</div>
            <div style={{ fontSize: "0.78rem", color: COLORS.slate, marginTop: 3 }}>For: {account.name}</div>
          </div>
          <button onClick={onClose} style={{ border: "none", background: "none", cursor: "pointer", color: COLORS.slate }}>
            <Icon name="X" size={18} />
          </button>
        </div>

        {done ? (
          <div style={{
            display: "flex", alignItems: "center", gap: 7, color: COLORS.success,
            fontSize: "0.85rem", fontWeight: 600, padding: "10px 12px", borderRadius: 8,
            background: "rgba(31,157,109,0.08)",
          }}>
            <Icon name="CheckCircle2" size={15} /> Password reset successfully.
          </div>
        ) : (
          <>
            <div style={{ marginBottom: 14 }} className="login-input-wrap">
              <label style={{ fontSize: "0.76rem", fontWeight: 700, color: COLORS.navy, marginBottom: 6, display: "block" }}>
                New Password
              </label>
              <div style={{ position: "relative" }}>
                <input type={showPw ? "text" : "password"} style={{ ...inputStyle, paddingRight: 44 }}
                  value={newPw} onChange={(e) => { setNewPw(e.target.value); setErr(""); }} autoFocus />
                <button type="button" onClick={() => setShowPw(!showPw)} style={{
                  position: "absolute", right: 12, top: 10, background: "none", border: "none",
                  cursor: "pointer", color: COLORS.slate,
                }}>
                  <Icon name={showPw ? "EyeOff" : "Eye"} size={16} />
                </button>
              </div>
            </div>
            <div style={{ marginBottom: 6 }} className="login-input-wrap">
              <label style={{ fontSize: "0.76rem", fontWeight: 700, color: COLORS.navy, marginBottom: 6, display: "block" }}>
                Confirm New Password
              </label>
              <input type="password" style={inputStyle} value={confirmPw}
                onChange={(e) => { setConfirmPw(e.target.value); setErr(""); }}
                onKeyDown={(e) => e.key === "Enter" && handleReset()} />
            </div>

            {err && (
              <div style={{
                display: "flex", alignItems: "center", gap: 7, color: COLORS.danger,
                fontSize: "0.76rem", fontWeight: 600, marginTop: 8,
                padding: "8px 12px", borderRadius: 8, background: "rgba(214,69,69,0.07)",
              }}>
                <Icon name="AlertCircle" size={13} /> {err}
              </div>
            )}

            <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
              <button onClick={onClose} style={{

                background: "#fff", color: COLORS.slate, fontWeight: 700, cursor: "pointer",

              <button onClick={handleReset} style={{

/* ── Main Reception Access Panel ── */
function ReceptionAccessPanel() {
  const [tab, setTab] = useState("accounts"); // "accounts" | "admin"
  const [accounts, setAccounts] = useState(() => loadReceptionAccounts());
  const [showAdd, setShowAdd] = useState(false);
  const [resetTarget, setResetTarget] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [flashMsg, setFlashMsg] = useState("");
  const [showAdminPw, setShowAdminPw] = useState(false);

  function flash(msg) {
    setFlashMsg(msg);
    setTimeout(() => setFlashMsg(""), 2500);
  }

  function handleAdd(acct) {
    const updated = [...accounts, acct];
    setAccounts(updated);
    saveReceptionAccounts(updated);
    flash("Account added successfully.");
  }

  function handleDelete(id) {
    const updated = accounts.filter(a => a.id !== id);
    setAccounts(updated);
    saveReceptionAccounts(updated);
    setDeleteConfirm(null);
    flash("Account deleted.");
  }

  function handleResetPw(id, newPw) {
    const updated = accounts.map(a => a.id === id ? { ...a, password: newPw } : a);
    setAccounts(updated);
    saveReceptionAccounts(updated);
    flash("Password reset successfully.");
  }

  const tabStyle = (active) => ({
    padding: "9px 20px", borderRadius: 10, border: "none", fontWeight: 700, fontSize: "0.84rem",
    cursor: "pointer", transition: "all 0.15s",

  return (

      {/* Tabs */}

            <Icon name="ShieldAlert" size={14} color={COLORS.slate} style={{ marginTop: 2 }} />
            <span style={{ fontSize: "0.74rem", color: COLORS.slate, lineHeight: 1.5 }}>
              Default password is <strong>admin123</strong>. Change it immediately for security.
              Password is stored in your browser's local storage.
            </span>
          </div>
        </div>
      )}

      {/* Modals */}
      {showAdd && (
        <AddReceptionAccountModal
          onClose={() => setShowAdd(false)}
          onAdd={handleAdd}
          existingNames={accounts.map(a => a.name)}
        />
      )}
      {resetTarget && (
        <ResetPasswordModal
          account={resetTarget}
          onClose={() => setResetTarget(null)}
          onReset={handleResetPw}
        />
      )}
      {showAdminPw && (
        <AdminChangePasswordModal onClose={() => setShowAdminPw(false)} />
      )}
    </div>
  );
}

function ChangePasswordModal({ onClose }) {
  const [current, setCurrent] = useState("");
  const [next, setNext] = useState("");
  const [confirm, setConfirm] = useState("");
  const [err, setErr] = useState("");
  const [done, setDone] = useState(false);

  function handleSubmit() {
    const creds = loadReceptionCreds();
    if (current !== creds.password) { setErr("Current password is incorrect"); return; }
    if (next.trim().length === 0) { setErr("Please enter a new password"); return; }
    if (next !== confirm) { setErr("New password and confirmation do not match"); return; }
    saveReceptionCreds({ id: creds.id, password: next });
    setErr("");
    setDone(true);
    setTimeout(() => onClose(), 1200);
  }

  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(11,30,61,0.55)", zIndex: 50,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
    }}>
      <div style={{ background: "#fff", borderRadius: 18, padding: "26px 24px", width: "100%", maxWidth: 380 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
          <div style={{ fontWeight: 800, color: COLORS.navy, fontSize: "1.05rem" }}>Change Password</div>
          <button onClick={onClose} style={{ border: "none", background: "none", cursor: "pointer", color: COLORS.slate }}>
            <Icon name="X" size={18} />
          </button>
        </div>

        {done ? (
          <div style={{
            display: "flex", alignItems: "center", gap: 7, color: COLORS.success,
            fontSize: "0.85rem", fontWeight: 600, padding: "10px 12px", borderRadius: 8,
            background: "rgba(31,157,109,0.08)",
          }}>
            <Icon name="CheckCircle2" size={15} /> Password updated successfully.
          </div>
        ) : (
          <>
            <div style={{ marginBottom: 12 }} className="login-input-wrap">
              <label style={{ fontSize: "0.76rem", fontWeight: 700, color: COLORS.navy, marginBottom: 6, display: "block" }}>
                Current Password
              </label>
              <input type="password" style={inputStyle} value={current}
                onChange={(e) => { setCurrent(e.target.value); setErr(""); }} autoFocus />
            </div>
            <div style={{ marginBottom: 12 }} className="login-input-wrap">
              <label style={{ fontSize: "0.76rem", fontWeight: 700, color: COLORS.navy, marginBottom: 6, display: "block" }}>
                New Password
              </label>
              <input type="password" style={inputStyle} value={next}
                onChange={(e) => { setNext(e.target.value); setErr(""); }} />
            </div>
            <div style={{ marginBottom: 6 }} className="login-input-wrap">
              <label style={{ fontSize: "0.76rem", fontWeight: 700, color: COLORS.navy, marginBottom: 6, display: "block" }}>
                Confirm New Password
              </label>
              <input type="password" style={inputStyle} value={confirm}
                onChange={(e) => { setConfirm(e.target.value); setErr(""); }}
                onKeyDown={(e) => e.key === "Enter" && handleSubmit()} />
            </div>

            {err && (
              <div style={{
                display: "flex", alignItems: "center", gap: 7, color: COLORS.danger,
                fontSize: "0.76rem", fontWeight: 600, marginTop: 8,
                padding: "8px 12px", borderRadius: 8, background: "rgba(214,69,69,0.07)",
              }}>
                <Icon name="AlertCircle" size={13} /> {err}
              </div>
            )}

            <button onClick={handleSubmit} style={{
              width: "100%", marginTop: 16, padding: "12px", borderRadius: 10, border: "none",
              background: COLORS.navy, color: "#fff", fontWeight: 800, fontSize: "0.86rem", cursor: "pointer",
            }}>
              Update Password
            </button>
          </>
        )}
      </div>
    </div>
  );
}

function VisitorManagementSystem() {
  const [role, setRole] = useState(null); // null | "receptionist" | "admin"
  const [active, setActive] = useState("dashboard");
  const [visits, setVisits] = useState(seedVisits);
  const [hosts, setHosts] = useState(INITIAL_HOSTS);
  const [blacklist, setBlacklist] = useState([
    { phone: "+91 99887 66554", name: "Deepak Rane", reason: "Unauthorized entry attempt", date: new Date(Date.now() - 12 * 86400000) },
  ]);
  const [syncing, setSyncing] = useState(true);

  // Load real data from Google Sheet on first load
  useEffect(() => {
    (async () => {
      const all = await apiGet("");
      if (all) {
        if (Array.isArray(all.visits) && all.visits.length) {
          setVisits(all.visits.map((v) => ({
            ...v,
            checkIn: toDateOrNull(v.checkIn) || new Date(),
            checkOut: toDateOrNull(v.checkOut),
            vip: v.vip === true || v.vip === "TRUE" || v.vip === "true",
            blacklisted: v.blacklisted === true || v.blacklisted === "TRUE" || v.blacklisted === "true",
          })));
        }
        if (Array.isArray(all.hosts) && all.hosts.length) setHosts(all.hosts);
        if (Array.isArray(all.blacklist) && all.blacklist.length) {
          setBlacklist(all.blacklist.map((b) => ({ ...b, date: toDateOrNull(b.date) || new Date() })));
        }
      }
      setSyncing(false);
    })();
  }, []);

  const [showCheckIn, setShowCheckIn] = useState(false);
  const [showAddHost, setShowAddHost] = useState(false);
  const [selectedVisit, setSelectedVisit] = useState(null);
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [tick, setTick] = useState(Date.now());
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const windowWidth = useWindowWidth();
  const isMobile = windowWidth < 768;
  const isTablet = windowWidth >= 768 && windowWidth < 1100;

  useEffect(() => {
    const i = setInterval(() => setTick(Date.now()), 30000);
    return () => clearInterval(i);
  }, []);

  useEffect(() => {
    if (!isMobile) setSidebarOpen(false);
  }, [isMobile]);

  const today = new Date();
  const isToday = (d) => d.toDateString() === today.toDateString();

  const todaysVisits = useMemo(() => visits.filter((v) => isToday(v.checkIn)), [visits, tick]);
  const activeVisitors = useMemo(() => visits.filter((v) => v.status === "checked-in"), [visits]);
  const checkedOutToday = todaysVisits.filter((v) => v.status === "checked-out");

  const avgDuration = useMemo(() => {
    const done = checkedOutToday;
    if (done.length === 0) return 0;
    const total = done.reduce((s, v) => s + minutesBetween(v.checkIn, v.checkOut), 0);
    return Math.round(total / done.length);
  }, [checkedOutToday]);

  function handleCheckIn(form) {
    // Generate next PT ID based on all existing visits
    const maxNum = visits.reduce((max, v) => {
      const match = v.id && v.id.match(/^PT(\d+)$/);
      return match ? Math.max(max, parseInt(match[1], 10)) : max;
    }, 0);
    const ptId = "PT" + String(maxNum + 1).padStart(3, "0");

    const newVisit = {
      id: ptId,
      name: form.name, phone: form.phone, company: form.company || "—",
      email: form.email || "", address: form.address || "",
      idType: form.idType || "", idNumber: form.idNumber || "",
      vehicleNumber: form.vehicleNumber || "", duration: form.duration || "", vip: !!form.vip,
      type: form.type, hostId: form.hostId, purpose: form.purpose,
      status: "checked-in", checkIn: new Date(), checkOut: null,
      photo: form.photo || null, resume: form.resume || null,
      badge: "VM-" + Math.floor(1000 + Math.random() * 9000), blacklisted: false,
    };
    setVisits((v) => [newVisit, ...v]);
    setShowCheckIn(false);
    apiPost("addVisit", { visit: { ...newVisit, checkIn: newVisit.checkIn.toISOString(), checkOut: "" } });
  }

  function handleCheckout(id) {
    const checkOutTime = new Date();
    setVisits((vs) => vs.map((v) => v.id === id ? { ...v, status: "checked-out", checkOut: checkOutTime } : v));
    apiPost("checkoutVisit", { id, checkOut: checkOutTime.toISOString() });
  }

  function handleBlacklist(visit) {
    const entry = { phone: visit.phone, name: visit.name, reason: "Manually added by admin", date: new Date() };
    setBlacklist((bl) => [...bl, entry]);
    apiPost("addBlacklist", { entry: { ...entry, date: entry.date.toISOString() } });
  }

  function removeFromBlacklist(phone) {
    setBlacklist((bl) => bl.filter((b) => b.phone !== phone));
    apiPost("removeBlacklist", { phone });
  }

  function addHost(host) {
    const newHost = { ...host, id: "h" + Math.random().toString(36).slice(2, 9) };
    setHosts((hs) => [...hs, newHost]);
    apiPost("addHost", { host: newHost });
  }

  function removeHost(id) {
    setHosts((hs) => hs.filter((h) => h.id !== id));
    apiPost("deleteHost", { id });
  }

  const filteredVisits = useMemo(() => {
    return visits.filter((v) => {
      const matchesSearch = search.trim() === "" ||
        v.name.toLowerCase().includes(search.toLowerCase()) ||
        v.phone.includes(search) ||
        v.company.toLowerCase().includes(search.toLowerCase());
      const matchesType = typeFilter === "all" || v.type === typeFilter;
      return matchesSearch && matchesType;
    });
  }, [visits, search, typeFilter]);

  if (!role) return <LoginScreen onLogin={(r) => setRole(r)} />;

  if (role === "receptionist") {

      <ReceptionistView
        visits={visits}
        blacklist={blacklist}
        activeVisitors={activeVisitors}
        onCheckIn={handleCheckIn}
        onCheckout={handleCheckout}
        onLogout={() => setRole(null)}
        hosts={hosts}
      />
    );
  }

  if (showCheckIn) {
    return (
      <CheckInPage
        onClose={() => setShowCheckIn(false)}
        onSubmit={handleCheckIn}
        blacklist={blacklist}
        hosts={hosts}
      />
    );
  }

  const pageTitle = {
    dashboard: "Dashboard", visitors: "Active Visitors", history: "Visit History",

    "reception-access": "Reception Access",

  return (
    <div style={{
      display: "flex", background: COLORS.ice,
      ...(isMobile
        ? { minHeight: "100dvh" }
        : { height: "100vh", maxHeight: "100dvh", overflow: "hidden" }),
    }}>
      <Sidebar

        isOpen={sidebarOpen}

      <div style={{ flex: 1, minWidth: 0, height: isMobile ? "auto" : "100%", overflowY: isMobile ? "visible" : "auto" }}>
        {/* ── Top bar ── */}

          padding: isMobile ? "12px 14px" : "20px 32px",

          gap: 10,

          <div style={{ display: "flex", alignItems: "center", gap: isMobile ? 10 : 0, minWidth: 0 }}>
            {/* Hamburger — mobile only */}

              <button onClick={() => setSidebarOpen(true)} style={{
                border: "none", background: "#F4F7FC", borderRadius: 9, width: 36, height: 36, flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: COLORS.navy,
              }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                  <line x1="3" y1="6" x2="21" y2="6"/>
                  <line x1="3" y1="12" x2="21" y2="12"/>
                  <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
              </button>

            <div style={{ minWidth: 0 }}>
              <div style={{ fontFamily: "'Inter', sans-serif", fontSize: isMobile ? "1.05rem" : "1.3rem", fontWeight: 700, color: COLORS.navy, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {pageTitle[active]}
              </div>
              {!isMobile && (
                <div style={{ fontSize: "0.8rem", color: COLORS.slate, marginTop: 2 }}>
                  {fmtDate(today)} · {activeVisitors.length} visitor{activeVisitors.length !== 1 ? "s" : ""} currently on premises

                    <div style={{ fontSize: "0.78rem", color: COLORS.slate }}>{b.phone} · {b.reason}</div>

              <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #EEF1F7" }}>
                <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 16 }}>Weekly Footfall Trend</div>
                {["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Today"].map((d, i) => {
                  const val = [14, 18, 11, 22, 17, 6, todaysVisits.length][i];
                  const max = 22;
                  return (
                    <div key={d} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                      <div style={{ width: 44, fontSize: "0.76rem", color: COLORS.slate, fontWeight: 600 }}>{d}</div>
                      <div style={{ flex: 1, height: 9, background: "#F0F3FA", borderRadius: 5, overflow: "hidden" }}>
                        <div style={{ width: `${(val / max) * 100}%`, height: "100%", background: i === 6 ? COLORS.royal : COLORS.sky, borderRadius: 5 }} />
                      </div>
                      <div style={{ width: 28, fontSize: "0.78rem", fontWeight: 700, color: COLORS.navy, textAlign: "right" }}>{val}</div>
                    </div>
                  );
                })}
              </div>

              <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #EEF1F7" }}>
                <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 16 }}>Export Reports</div>
                <div style={{ fontSize: "0.82rem", color: COLORS.slate, marginBottom: 18, lineHeight: 1.6 }}>
                  Download a CSV file (opens directly in Excel) based on the visitor data currently in the system.
                </div>
                <button onClick={() => exportTodaysVisitorLog(visits, hosts)} style={{
                  width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E3E8F2", background: "#FAFBFD",
                  color: COLORS.navy, fontWeight: 600, fontSize: "0.84rem", marginBottom: 8, cursor: "pointer",
                }}>
                  Today's Visitor Log <Icon name="ArrowUpRight" size={15} color={COLORS.slate} />
                </button>
                <button onClick={() => exportWeekSummary(visits, hosts)} style={{
                  width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E3E8F2", background: "#FAFBFD",
                  color: COLORS.navy, fontWeight: 600, fontSize: "0.84rem", marginBottom: 8, cursor: "pointer",
                }}>
                  This Week Summary <Icon name="ArrowUpRight" size={15} color={COLORS.slate} />
                </button>
                <button onClick={() => exportMonthlyDepartmentReport(visits, hosts)} style={{
                  width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E3E8F2", background: "#FAFBFD",
                  color: COLORS.navy, fontWeight: 600, fontSize: "0.84rem", marginBottom: 8, cursor: "pointer",
                }}>
                  Monthly Department Report <Icon name="ArrowUpRight" size={15} color={COLORS.slate} />
                </button>
                <button onClick={() => exportBlacklistAuditLog(blacklist)} style={{
                  width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E3E8F2", background: "#FAFBFD",
                  color: COLORS.navy, fontWeight: 600, fontSize: "0.84rem", marginBottom: 8, cursor: "pointer",
                }}>
                  Blacklist Audit Log <Icon name="ArrowUpRight" size={15} color={COLORS.slate} />
                </button>
              </div>
            </div>
          )}

          {active === "reception-access" && <ReceptionAccessPanel />}
        </div>
      </div>

      {selectedVisit && (
        <VisitorDetailModal
          visit={selectedVisit}
          host={hosts.find((h) => h.id === selectedVisit.hostId)}
          onClose={() => setSelectedVisit(null)}
          onCheckout={handleCheckout}
          onBlacklist={handleBlacklist}
        />
      )}
      {showAddHost && (
        <AddHostModal
          onClose={() => setShowAddHost(false)}
          onSubmit={(host) => { addHost(host); setShowAddHost(false); }}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<VisitorManagementSystem />);
</script>
</body>
</html>
