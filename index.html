function fmtTime(d) {
  return d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
}
function fmtDate(d) {
  return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
}
function minutesBetween(a, b) {
  return Math.round((b - a) / 60000);
}
function durationLabel(mins) {
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${h}h ${m}m`;
}

/* ---------- CSV export helpers ---------- */
function csvEscape(val) {
  const s = String(val == null ? "" : val);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function downloadCSV(filename, headers, rows) {
  const lines = [headers.map(csvEscape).join(",")];
  rows.forEach((row) => lines.push(row.map(csvEscape).join(",")));
  const csv = lines.join("\r\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function visitRowsToCSV(visits, hosts) {
  const headers = ["Name", "Phone", "Company", "Visit Type", "Host", "Department", "Purpose", "Check-in", "Check-out", "Duration", "Status"];
  const rows = visits.map((v) => {
    const t = VISIT_TYPES.find((x) => x.id === v.type);
    const host = hosts.find((h) => h.id === v.hostId);
    return [
      v.name, v.phone, v.company || "—", t ? t.label : v.type,
      host ? host.name : "—", host ? host.dept : "—", v.purpose,
      `${fmtDate(v.checkIn)} ${fmtTime(v.checkIn)}`,
      v.checkOut ? `${fmtDate(v.checkOut)} ${fmtTime(v.checkOut)}` : "Still inside",
      v.checkOut ? durationLabel(minutesBetween(v.checkIn, v.checkOut)) : "—",
      v.status === "checked-in" ? "Checked In" : "Checked Out",
    ];
  });
  return { headers, rows };
}

function exportTodaysVisitorLog(visits, hosts) {
  const today = new Date();
  const todays = visits.filter((v) => v.checkIn.toDateString() === today.toDateString());
  const { headers, rows } = visitRowsToCSV(todays, hosts);
  downloadCSV(`Todays_Visitor_Log_${today.toISOString().slice(0, 10)}.csv`, headers, rows);
}

function exportWeekSummary(visits, hosts) {
  const now = new Date();
  const weekAgo = new Date(now.getTime() - 7 * 86400000);
  const weekVisits = visits.filter((v) => v.checkIn >= weekAgo && v.checkIn <= now);
  const { headers, rows } = visitRowsToCSV(weekVisits, hosts);
  downloadCSV(`This_Week_Summary_${now.toISOString().slice(0, 10)}.csv`, headers, rows);
}

function exportMonthlyDepartmentReport(visits, hosts) {
  const now = new Date();
  const monthAgo = new Date(now.getTime() - 30 * 86400000);
  const monthVisits = visits.filter((v) => v.checkIn >= monthAgo && v.checkIn <= now);
  const counts = {};
  monthVisits.forEach((v) => {
    const host = hosts.find((h) => h.id === v.hostId);
    const dept = host ? host.dept : "Unknown";
    counts[dept] = (counts[dept] || 0) + 1;
  });
  const headers = ["Department", "Total Visits (Last 30 Days)"];
  const rows = Object.keys(counts).map((dept) => [dept, counts[dept]]);
  downloadCSV(`Monthly_Department_Report_${now.toISOString().slice(0, 10)}.csv`, headers, rows);
}

function Avatar({ name, size = 38, photo = null }) {
  const initials = name.split(" ").map((p) => p[0]).slice(0, 2).join("").toUpperCase();
  const hue = useMemo(() => {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h + name.charCodeAt(i) * 7) % 360;
    return h;
  }, [name]);
  if (photo) {
    return (
      <img src={photo} alt={name} style={{
        width: size, height: size, borderRadius: "50%", flexShrink: 0, objectFit: "cover",
      }} />
    );
  }
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%", flexShrink: 0,
      background: `linear-gradient(135deg, hsl(${hue},65%,45%), hsl(${hue + 30},70%,38%))`,
      color: "#fff", display: "flex", alignItems: "center", justifyContent: "center",
      fontWeight: 700, fontSize: size * 0.36, letterSpacing: "0.02em",
    }}>
      {initials}
    </div>
  );
}

function WebcamCapture({ photo, onCapture, onClear }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const [mode, setMode] = useState("idle"); // idle | starting | live | error
  const [errMsg, setErrMsg] = useState("");

  function stopStream() {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach((t) => t.stop());
      streamRef.current = null;
    }
    if (videoRef.current) {
      videoRef.current.srcObject = null;
    }
  }

  async function startCamera() {
    // If a stream is already live, don't request a new one.
    if (streamRef.current && mode === "live") return;
    setMode("starting");
    setErrMsg("");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 480 }, height: { ideal: 360 }, facingMode: "user" },
        audio: false,
      });
      streamRef.current = stream;
      setMode("live");
    } catch (err) {
      setMode("error");
      if (err && err.name === "NotAllowedError") {
        setErrMsg("Camera permission was denied. Please allow camera access in your browser settings.");
      } else if (err && err.name === "NotFoundError") {
        setErrMsg("No webcam was found on this device.");
      } else {
        setErrMsg("Could not access the webcam. Please check your camera and try again.");
      }
    }
  }

  // Attach the stream to the <video> element only once it exists in the DOM
  // (i.e. after mode becomes "live" and React has rendered the <video> tag).
  useEffect(() => {
    if (mode === "live" && streamRef.current && videoRef.current) {
      const video = videoRef.current;
      video.srcObject = streamRef.current;
      const playVideo = () => {
        video.play().catch(() => {
          // Autoplay can be blocked momentarily on some mobile browsers;
          // retry once after a short delay.
          setTimeout(() => video.play().catch(() => {}), 200);
        });
      };
      if (video.readyState >= 1) {
        playVideo();
      } else {
        video.onloadedmetadata = playVideo;
      }
    }
  }, [mode]);

  function takeSnapshot() {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) {
      // Video isn't ready yet — try again shortly instead of capturing a black frame.
      setTimeout(takeSnapshot, 150);
      return;
    }
    const size = 320;
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext("2d");
    const side = Math.min(vw, vh);
    const sx = (vw - side) / 2, sy = (vh - side) / 2;
    ctx.drawImage(video, sx, sy, side, side, 0, 0, size, size);
    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    stopStream();
    setMode("idle");
    onCapture(dataUrl);
  }

  function retake() {
    onClear();
    stopStream();
    // Give the browser a brief moment to fully release the previous camera
    // track before requesting a new stream — helps avoid a duplicate prompt.
    setTimeout(startCamera, 250);
  }

  useEffect(() => {
    return () => stopStream();
  }, []);

  if (photo) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <img src={photo} alt="Visitor" style={{
          width: 84, height: 84, borderRadius: 12, objectFit: "cover",
          border: "2px solid " + COLORS.success,
        }} />
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, color: COLORS.success, fontWeight: 700, fontSize: "0.85rem", marginBottom: 8 }}>
            <Icon name="CheckCircle2" size={16} /> Photo captured
          </div>
          <button onClick={retake} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 8,
            border: "1.5px solid #E3E8F2", background: "#FAFBFD", color: COLORS.slate,
            fontWeight: 700, fontSize: "0.8rem", cursor: "pointer",
          }}>
            <Icon name="RefreshCw" size={14} /> Retake photo
          </button>
        </div>
      </div>
    );
  }

  if (mode === "live") {
    return (
      <div>
        <div style={{
          position: "relative", width: "100%", maxWidth: 320, margin: "0 auto",
          borderRadius: 14, overflow: "hidden", background: "#000", aspectRatio: "1/1",
        }}>
          <video ref={videoRef} autoPlay playsInline muted style={{
            width: "100%", height: "100%", objectFit: "cover", transform: "scaleX(-1)",
          }} />
          <div style={{
            position: "absolute", inset: 14, border: "2px dashed rgba(255,255,255,0.5)",
            borderRadius: 12, pointerEvents: "none",
          }} />
        </div>
        <canvas ref={canvasRef} style={{ display: "none" }} />
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 12 }}>
          <button onClick={() => { stopStream(); setMode("idle"); }} style={{
            padding: "10px 16px", borderRadius: 9, border: "1.5px solid #E3E8F2", background: "#fff",
            color: COLORS.slate, fontWeight: 700, fontSize: "0.82rem", cursor: "pointer",
          }}>Cancel</button>
          <button onClick={takeSnapshot} style={{
            display: "flex", alignItems: "center", gap: 7, padding: "10px 20px", borderRadius: 9, border: "none",
            background: COLORS.royal, color: "#fff", fontWeight: 700, fontSize: "0.82rem", cursor: "pointer",
            boxShadow: "0 8px 18px -8px rgba(30,79,217,0.5)",
          }}>
            <Icon name="Camera" size={15} /> Capture Photo
          </button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <button onClick={startCamera} disabled={mode === "starting"} style={{
        width: "100%", padding: "16px", borderRadius: 10, border: "1.5px dashed #C9D3E5",
        background: "#FAFBFD", cursor: mode === "starting" ? "wait" : "pointer",
        display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        color: COLORS.slate, fontWeight: 600, fontSize: "0.85rem",
      }}>
        <Icon name={mode === "starting" ? "RefreshCw" : "Camera"} size={17} />
        {mode === "starting" ? "Starting webcam..." : "Capture via webcam"}
      </button>
      {mode === "error" && (
        <div style={{
          display: "flex", gap: 8, alignItems: "flex-start", marginTop: 10, padding: "10px 12px",
          background: "rgba(214,69,69,0.07)", borderRadius: 9, color: COLORS.danger, fontSize: "0.78rem", fontWeight: 600,
        }}>
          <Icon name="AlertCircle" size={15} style={{ flexShrink: 0, marginTop: 1 }} />
          {errMsg}
        </div>
      )}
    </div>
  );
}

  }

    return (

function VisitorManagementSystem() {
  const [role, setRole] = useState(null); // null | "receptionist" | "admin"
  const [active, setActive] = useState("dashboard");
  const [visits, setVisits] = useState(seedVisits);
  const [hosts, setHosts] = useState(INITIAL_HOSTS);
  const [blacklist, setBlacklist] = useState([
    { phone: "+91 99887 66554", name: "Deepak Rane", reason: "Unauthorized entry attempt", date: new Date(Date.now() - 12 * 86400000) },
  ]);
  const [showCheckIn, setShowCheckIn] = useState(false);
  const [showAddHost, setShowAddHost] = useState(false);
  const [selectedVisit, setSelectedVisit] = useState(null);
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [tick, setTick] = useState(Date.now());

  useEffect(() => {
    const i = setInterval(() => setTick(Date.now()), 30000);
    return () => clearInterval(i);
  }, []);

  const today = new Date();
  const isToday = (d) => d.toDateString() === today.toDateString();

  const todaysVisits = useMemo(() => visits.filter((v) => isToday(v.checkIn)), [visits, tick]);
  const activeVisitors = useMemo(() => visits.filter((v) => v.status === "checked-in"), [visits]);
  const checkedOutToday = todaysVisits.filter((v) => v.status === "checked-out");

  const avgDuration = useMemo(() => {
    const done = checkedOutToday;
    if (done.length === 0) return 0;
    const total = done.reduce((s, v) => s + minutesBetween(v.checkIn, v.checkOut), 0);
    return Math.round(total / done.length);
  }, [checkedOutToday]);

  function handleCheckIn(form) {
    const newVisit = {
      id: "v" + Math.random().toString(36).slice(2, 9),
      name: form.name, phone: form.phone, company: form.company || "—",
      email: form.email || "", address: form.address || "",
      idType: form.idType || "", idNumber: form.idNumber || "",
      vehicleNumber: form.vehicleNumber || "", duration: form.duration || "", vip: !!form.vip,
      type: form.type, hostId: form.hostId, purpose: form.purpose,
      status: "checked-in", checkIn: new Date(), checkOut: null,
      photo: form.photo || null, resume: form.resume || null,
      badge: "VM-" + Math.floor(1000 + Math.random() * 9000), blacklisted: false,
    };
    setVisits((v) => [newVisit, ...v]);
    setShowCheckIn(false);
  }

  function handleCheckout(id) {
    setVisits((vs) => vs.map((v) => v.id === id ? { ...v, status: "checked-out", checkOut: new Date() } : v));
  }

  function handleBlacklist(visit) {
    setBlacklist((bl) => [...bl, { phone: visit.phone, name: visit.name, reason: "Manually added by admin", date: new Date() }]);
  }

  function removeFromBlacklist(phone) {
    setBlacklist((bl) => bl.filter((b) => b.phone !== phone));
  }

  function addHost(host) {
    setHosts((hs) => [...hs, { ...host, id: "h" + Math.random().toString(36).slice(2, 9) }]);
  }

  function removeHost(id) {
    setHosts((hs) => hs.filter((h) => h.id !== id));
  }

  const filteredVisits = useMemo(() => {
    return visits.filter((v) => {
      const matchesSearch = search.trim() === "" ||
        v.name.toLowerCase().includes(search.toLowerCase()) ||
        v.phone.includes(search) ||
        v.company.toLowerCase().includes(search.toLowerCase());
      const matchesType = typeFilter === "all" || v.type === typeFilter;
      return matchesSearch && matchesType;
    });
  }, [visits, search, typeFilter]);

  if (!role) return <LoginScreen onLogin={(r) => setRole(r)} />;

  if (role === "receptionist") {
    return (
      <ReceptionistView
        visits={visits}
        blacklist={blacklist}
        activeVisitors={activeVisitors}
        onCheckIn={handleCheckIn}
        onCheckout={handleCheckout}
        onLogout={() => setRole(null)}
        hosts={hosts}
      />
    );
  }

  if (showCheckIn) {
    return (
      <CheckInPage
        onClose={() => setShowCheckIn(false)}
        onSubmit={handleCheckIn}
        blacklist={blacklist}
        hosts={hosts}
      />
    );
  }

  const pageTitle = {
    dashboard: "Dashboard", visitors: "Active Visitors", history: "Visit History",
    hosts: "Hosts & Employees", blacklist: "Blacklist Management", reports: "Reports & Analytics",
  };

  return (
    <div style={{ display: "flex", background: COLORS.ice, height: "100vh", maxHeight: "100dvh", overflow: "hidden" }}>
      <Sidebar active={active} setActive={setActive} onLogout={() => setRole(null)} pendingCount={activeVisitors.length} />

      <div style={{ flex: 1, minWidth: 0, height: "100%", overflowY: "auto" }}>
        <div style={{
          padding: "20px 32px", display: "flex", justifyContent: "space-between", alignItems: "center",
          borderBottom: "1px solid #E7EBF3", background: "#fff", position: "sticky", top: 0, zIndex: 10,
        }}>
          <div>
            <div style={{ fontFamily: "'Lexend', sans-serif", fontSize: "1.3rem", fontWeight: 700, color: COLORS.navy }}>
              {pageTitle[active]}
            </div>
            <div style={{ fontSize: "0.8rem", color: COLORS.slate, marginTop: 2 }}>
              {fmtDate(today)} · {activeVisitors.length} visitor{activeVisitors.length !== 1 ? "s" : ""} currently on premises
            </div>
          </div>
          {active === "hosts" ? (
            <button onClick={() => setShowAddHost(true)} style={{
              display: "flex", alignItems: "center", gap: 8, padding: "11px 20px", borderRadius: 11,
              border: "none", background: COLORS.royal, color: "#fff", fontWeight: 700, fontSize: "0.86rem",
              cursor: "pointer", boxShadow: "0 10px 24px -10px rgba(30,79,217,0.6)",
            }}>
              <Icon name="UserPlus" size={17} /> Add Host
            </button>
          ) : (active === "dashboard" || active === "visitors") ? (
            <button onClick={() => setShowCheckIn(true)} style={{
              display: "flex", alignItems: "center", gap: 8, padding: "11px 20px", borderRadius: 11,
              border: "none", background: COLORS.royal, color: "#fff", fontWeight: 700, fontSize: "0.86rem",
              cursor: "pointer", boxShadow: "0 10px 24px -10px rgba(30,79,217,0.6)",
            }}>
              <Icon name="UserPlus" size={17} /> New Check-in
            </button>
          ) : null}
        </div>

        <div style={{ padding: "28px 32px" }}>
          {active === "dashboard" && (
            <>
              <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 24 }}>
                <StatCard label="Visitors Today" value={todaysVisits.length} delta={12} iconName="Users" accent={COLORS.royal} />
                <StatCard label="Currently Inside" value={activeVisitors.length} iconName="UserCheck" accent={COLORS.success} />
                <StatCard label="Avg. Visit Duration" value={durationLabel(avgDuration || 0)} iconName="Clock" accent={COLORS.amber} />
                <StatCard label="Blacklisted Contacts" value={blacklist.length} iconName="ShieldAlert" accent={COLORS.danger} />
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 18 }}>
                <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #EEF1F7" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <div style={{ fontWeight: 800, color: COLORS.navy, fontSize: "1rem" }}>Live Activity</div>
                    <Badge tone="success">● Live</Badge>
                  </div>
                  {activeVisitors.length === 0 ? (
                    <EmptyState text="No visitors are currently on the premises." />
                  ) : (
                    activeVisitors.slice(0, 6).map((v) => (
                      <VisitRow key={v.id} visit={v} host={hosts.find((h) => h.id === v.hostId)}
                        onOpen={setSelectedVisit} onCheckout={handleCheckout} />
                    ))
                  )}
                </div>

                <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #EEF1F7" }}>
                  <div style={{ fontWeight: 800, color: COLORS.navy, fontSize: "1rem", marginBottom: 16 }}>Visit Type Split — Today</div>
                  {VISIT_TYPES.map((t) => {
                    const count = todaysVisits.filter((v) => v.type === t.id).length;
                    const pct = todaysVisits.length ? Math.round((count / todaysVisits.length) * 100) : 0;
                    return (
                      <div key={t.id} style={{ marginBottom: 14 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.82rem", marginBottom: 6 }}>
                          <span style={{ display: "flex", alignItems: "center", gap: 6, fontWeight: 600, color: COLORS.navy }}>
                            <Icon name={t.icon} size={14} color={t.color} /> {t.label}
                          </span>
                          <span style={{ color: COLORS.slate, fontWeight: 600 }}>{count}</span>
                        </div>
                        <div style={{ height: 7, background: "#F0F3FA", borderRadius: 5, overflow: "hidden" }}>
                          <div style={{ width: `${pct}%`, height: "100%", background: t.color, borderRadius: 5 }} />
                        </div>
                      </div>
                    );
                  })}

                  <div style={{ marginTop: 22, paddingTop: 18, borderTop: "1px solid #EEF1F7" }}>
                    <div style={{ fontWeight: 800, color: COLORS.navy, fontSize: "0.92rem", marginBottom: 10 }}>Department Footfall</div>
                    {DEPARTMENTS.slice(0, 4).map((d) => {
                      const count = todaysVisits.filter((v) => { const h = hosts.find(h => h.id === v.hostId); return h && h.dept === d; }).length;
                      return (
                        <div key={d} style={{ display: "flex", justifyContent: "space-between", fontSize: "0.8rem", padding: "6px 0", color: COLORS.slate }}>
                          <span>{d}</span><span style={{ fontWeight: 700, color: COLORS.navy }}>{count}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </>
          )}

          {(active === "visitors" || active === "history") && (
            <>
              <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
                <div style={{ position: "relative", flex: "1 1 260px" }}>
                  <span style={{ position: "absolute", left: 13, top: 13, color: COLORS.slate }}><Icon name="Search" size={16} /></span>
                  <input placeholder="Search by name, phone or company..." value={search} onChange={(e) => setSearch(e.target.value)}
                    style={{ ...inputStyle, paddingLeft: 38 }} />
                </div>
                <select value={typeFilter} onChange={(e) => setTypeFilter(e.target.value)} style={{ ...inputStyle, width: 180, cursor: "pointer" }}>
                  <option value="all">All Visit Types</option>
                  {VISIT_TYPES.map((t) => <option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
              </div>

              <div style={{
                display: "grid", gridTemplateColumns: "auto 1.6fr 1fr 1fr 0.9fr auto", gap: 14,
                padding: "0 16px 10px", fontSize: "0.7rem", fontWeight: 700, color: COLORS.slate, letterSpacing: "0.04em",
              }}>
                <div></div><div>VISITOR</div><div>TYPE</div><div>HOST</div><div>TIME</div><div></div>
              </div>

              {(active === "visitors" ? filteredVisits.filter(v => v.status === "checked-in") : filteredVisits).length === 0 ? (
                <EmptyState text="No results found." />
              ) : (
                (active === "visitors" ? filteredVisits.filter(v => v.status === "checked-in") : filteredVisits)
                  .sort((a, b) => b.checkIn - a.checkIn)
                  .map((v) => (
                    <VisitRow key={v.id} visit={v} host={hosts.find((h) => h.id === v.hostId)}
                      onOpen={setSelectedVisit} onCheckout={handleCheckout} />
                  ))
              )}
            </>
          )}

          {active === "hosts" && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 14 }}>
              {hosts.map((h) => {
                const hostVisits = visits.filter((v) => v.hostId === h.id);
                return (
                  <div key={h.id} style={{ background: "#fff", borderRadius: 14, padding: "18px 20px", border: "1px solid #EEF1F7" }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 12 }}>
                      <Avatar name={h.name} size={42} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, color: COLORS.navy, fontSize: "0.92rem" }}>{h.name}</div>
                        <div style={{ fontSize: "0.76rem", color: COLORS.slate }}>{h.dept}</div>
                        {h.role && (
                          <div style={{ fontSize: "0.72rem", color: COLORS.royal, fontWeight: 600, marginTop: 2 }}>{h.role}</div>
                        )}
                      </div>
                      <button onClick={() => removeHost(h.id)} title="Remove host" style={{
                        border: "none", background: "#F4F7FC", borderRadius: 8, padding: "6px 8px",
                        cursor: "pointer", color: COLORS.danger, flexShrink: 0,
                      }}>
                        <Icon name="Trash2" size={14} />
                      </button>
                    </div>
                    <div style={{ fontSize: "0.78rem", color: COLORS.slate, display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                      <Icon name="Phone" size={12} /> {h.phone}
                    </div>
                    <div style={{ fontSize: "0.78rem", color: COLORS.royal, fontWeight: 700, marginTop: 8 }}>
                      {hostVisits.length} total visit{hostVisits.length !== 1 ? "s" : ""}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {active === "blacklist" && (
            <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #EEF1F7", overflow: "hidden" }}>
              {blacklist.length === 0 ? (
                <div style={{ padding: 24 }}><EmptyState text="The blacklist is empty." /></div>
              ) : blacklist.map((b, i) => (
                <div key={b.phone + i} style={{
                  display: "flex", alignItems: "center", gap: 14, padding: "16px 22px",
                  borderBottom: i < blacklist.length - 1 ? "1px solid #EEF1F7" : "none",
                }}>
                  <div style={{
                    width: 38, height: 38, borderRadius: 10, background: "rgba(214,69,69,0.1)",
                    display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
                  }}>
                    <Icon name="ShieldAlert" size={17} color={COLORS.danger} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, color: COLORS.navy, fontSize: "0.88rem" }}>{b.name}</div>
                    <div style={{ fontSize: "0.78rem", color: COLORS.slate }}>{b.phone} · {b.reason}</div>
                  </div>
                  <div style={{ fontSize: "0.76rem", color: COLORS.slate }}>{fmtDate(b.date)}</div>
                  <button onClick={() => removeFromBlacklist(b.phone)} style={{
                    border: "none", background: "#F4F7FC", borderRadius: 8, padding: "7px 11px",
                    cursor: "pointer", color: COLORS.slate, fontSize: "0.76rem", fontWeight: 700,
                  }}>
                    Remove
                  </button>
                </div>
              ))}
            </div>
          )}

          {active === "reports" && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
              <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #EEF1F7" }}>
                <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 16 }}>Weekly Footfall Trend</div>
                {["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Today"].map((d, i) => {
                  const val = [14, 18, 11, 22, 17, 6, todaysVisits.length][i];
                  const max = 22;
                  return (
                    <div key={d} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                      <div style={{ width: 44, fontSize: "0.76rem", color: COLORS.slate, fontWeight: 600 }}>{d}</div>
                      <div style={{ flex: 1, height: 9, background: "#F0F3FA", borderRadius: 5, overflow: "hidden" }}>
                        <div style={{ width: `${(val / max) * 100}%`, height: "100%", background: i === 6 ? COLORS.royal : COLORS.sky, borderRadius: 5 }} />
                      </div>
                      <div style={{ width: 28, fontSize: "0.78rem", fontWeight: 700, color: COLORS.navy, textAlign: "right" }}>{val}</div>
                    </div>
                  );
                })}
              </div>

              <div style={{ background: "#fff", borderRadius: 16, padding: "22px 24px", border: "1px solid #EEF1F7" }}>
                <div style={{ fontWeight: 800, color: COLORS.navy, marginBottom: 16 }}>Export Reports</div>
                <div style={{ fontSize: "0.82rem", color: COLORS.slate, marginBottom: 18, lineHeight: 1.6 }}>
                  Download a CSV file (opens directly in Excel) based on the visitor data currently in the system.
                </div>
                <button onClick={() => exportTodaysVisitorLog(visits, hosts)} style={{
                  width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E3E8F2", background: "#FAFBFD",
                  color: COLORS.navy, fontWeight: 600, fontSize: "0.84rem", marginBottom: 8, cursor: "pointer",
                }}>
                  Today's Visitor Log <Icon name="ArrowUpRight" size={15} color={COLORS.slate} />
                </button>
                <button onClick={() => exportWeekSummary(visits, hosts)} style={{
                  width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E3E8F2", background: "#FAFBFD",
                  color: COLORS.navy, fontWeight: 600, fontSize: "0.84rem", marginBottom: 8, cursor: "pointer",
                }}>
                  This Week Summary <Icon name="ArrowUpRight" size={15} color={COLORS.slate} />
                </button>
                <button onClick={() => exportMonthlyDepartmentReport(visits, hosts)} style={{
                  width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E3E8F2", background: "#FAFBFD",
                  color: COLORS.navy, fontWeight: 600, fontSize: "0.84rem", marginBottom: 8, cursor: "pointer",
                }}>
                  Monthly Department Report <Icon name="ArrowUpRight" size={15} color={COLORS.slate} />
                </button>
                <button onClick={() => exportBlacklistAuditLog(blacklist)} style={{
                  width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "12px 14px", borderRadius: 10, border: "1.5px solid #E3E8F2", background: "#FAFBFD",
                  color: COLORS.navy, fontWeight: 600, fontSize: "0.84rem", marginBottom: 8, cursor: "pointer",
                }}>
                  Blacklist Audit Log <Icon name="ArrowUpRight" size={15} color={COLORS.slate} />
                </button>
              </div>
            </div>
          )}
        </div>
      </div>

      {selectedVisit && (
        <VisitorDetailModal
          visit={selectedVisit}
          host={hosts.find((h) => h.id === selectedVisit.hostId)}
          onClose={() => setSelectedVisit(null)}
          onCheckout={handleCheckout}
          onBlacklist={handleBlacklist}
        />
      )}
      {showAddHost && (
        <AddHostModal
          onClose={() => setShowAddHost(false)}
          onSubmit={(host) => { addHost(host); setShowAddHost(false); }}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<VisitorManagementSystem />);
</script>
</body>
</html>
